name: Refresh official schedules

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-official-schedules
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install --yes minisign

      - name: Restore signing key
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          test -n "$MINISIGN_SECRET_KEY"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$RUNNER_TEMP/registry.key"
          chmod 600 "$RUNNER_TEMP/registry.key"

      - name: Extend signed schedule horizon
        run: python3 scripts/refresh_schedules.py --secret-key "$RUNNER_TEMP/registry.key" --days 7

      - name: Publish changed schedules
        run: |
          if git diff --quiet; then
            echo "Schedule horizon is already current."
            exit 0
          fi
          git config user.name "5ives schedule bot"
          git config user.email "actions@users.noreply.github.com"
          git add channels/*/schedules
          git commit -m "Refresh official schedule horizon"
          git push
